      :root {
        color-scheme: dark;
        font-family: "Geist Pixel", monospace;
        --page-bg: linear-gradient(135deg, #090909 0%, #020202 55%, #0d0d0d 100%);
        --text-primary: #f4f1e8;
        --text-secondary: rgba(244, 241, 232, 0.62);
        --text-action: rgba(244, 241, 232, 0.86);
        --text-action-secondary: rgba(244, 241, 232, 0.8);
        --text-footer: rgba(244, 241, 232, 0.28);
        --caret: rgba(244, 241, 232, 0.9);
        --title-glow: rgba(255, 255, 255, 0.12);
        background: #040404;
        color: var(--text-primary);
      }

      :root[data-theme="light"] {
        color-scheme: light;
        --page-bg: linear-gradient(135deg, #f4f1e8 0%, #ebe6d8 58%, #dfd8c9 100%);
        --text-primary: #191612;
        --text-secondary: rgba(25, 22, 18, 0.56);
        --text-action: rgba(25, 22, 18, 0.88);
        --text-action-secondary: rgba(25, 22, 18, 0.72);
        --text-footer: rgba(25, 22, 18, 0.34);
        --caret: rgba(25, 22, 18, 0.82);
        --title-glow: rgba(255, 255, 255, 0.32);
        background: #f4f1e8;
        color: var(--text-primary);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        position: relative;
        overflow: hidden;
        padding: clamp(24px, 7vw, 88px);
        background: var(--page-bg);
        color: var(--text-primary);
      }

      .smoke-layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        pointer-events: none;
        opacity: 0.82;
      }

      .hero {
        position: absolute;
        left: 50%;
        top: 25vh;
        transform: translateX(-50%);
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        width: min(720px, calc(100vw - 48px));
      }

      .hero-view {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        width: 100%;
      }

      .hero-view[hidden] {
        display: none;
      }

      h1 {
        margin: 0;
        font-family: "Geist Pixel", monospace;
        font-size: clamp(64px, 13vw, 180px);
        line-height: 0.9;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: center;
        text-shadow: 0 0 28px var(--title-glow);
      }

      .typing-title {
        display: inline-block;
        white-space: nowrap;
        min-height: 0.9em;
      }

      .hero-copy {
        display: none;
      }

      .hero-tagline {
        margin: -4px 0 2px;
        color: var(--text-secondary);
        font-family: "Geist Pixel", monospace;
        font-size: clamp(11px, 1.35vw, 14px);
        line-height: 1.5;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: center;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      .download-ui {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .download-dialog {
        gap: 18px;
        padding-top: 24px;
      }

      .download-dialog-title {
        margin: 0;
        color: var(--text-primary);
        font-size: clamp(22px, 3vw, 34px);
        line-height: 1.1;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: center;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .download-dialog-glyph {
        font-family: "Departure Mono", monospace;
        font-size: 0.76em;
        line-height: 1;
        color: var(--text-action);
        opacity: 0.9;
      }

      .download-dialog-copy {
        margin: 0;
        color: var(--text-secondary);
        font-size: 11px;
        line-height: 1.6;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: center;
        max-width: 32rem;
      }

      .download-dialog-copy strong {
        color: var(--text-action);
        font-weight: 400;
      }

      .download-rows {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        margin-top: 10px;
        width: min(640px, calc(100vw - 48px));
      }

      .download-row {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 9px;
      }

      .download-os {
        color: var(--text-secondary);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding-top: 0;
      }

      .download-option {
        appearance: none;
        border: 0;
        padding: 0;
        background: transparent;
        color: var(--text-action-secondary);
        font: inherit;
        cursor: pointer;
        transition: color 140ms ease, transform 140ms ease;
      }

      .download-option:hover,
      .download-option.is-selected {
        color: var(--text-primary);
        transform: translateY(-1px);
      }

      .download-option-copy {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
      }

      .download-option-arch,
      .download-option-format {
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .download-option-arch {
        font-size: 12px;
      }

      .download-option-format {
        color: var(--text-footer);
        font-size: 10px;
      }

      .download-dialog-actions {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }

      .download-dialog-link {
        appearance: none;
        border: 0;
        padding: 0;
        background: transparent;
        color: var(--text-footer);
        font: inherit;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: color 140ms ease, transform 140ms ease;
      }

      .download-dialog-link:hover {
        color: var(--text-secondary);
        transform: translateY(-1px);
      }

      .cta,
      .platform-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .cta {
        min-height: 46px;
        padding: 0;
        border: 0;
        color: var(--text-action);
        background: transparent;
        font-family: "Geist Pixel", monospace;
        font-size: 13px;
        image-rendering: pixelated;
        transition: transform 140ms ease, color 140ms ease;
        gap: 10px;
      }

      .cta.cta-secondary {
        color: var(--text-action-secondary);
      }

      .cta:hover {
        transform: translateY(-1px);
        color: var(--text-primary);
      }

      .cta.cta-secondary:hover {
        color: var(--text-primary);
      }

      .cta-glyph {
        font-family: "Departure Mono", monospace;
        font-size: 14px;
        line-height: 1;
        color: inherit;
        opacity: 1;
        transition: opacity 80ms ease;
      }

      .cta.is-typing .cta-glyph,
      .cta.is-ready .cta-glyph {
        opacity: 1;
      }

      .cta-copy {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 3px;
      }

      .cta-label {
        display: inline-block;
        min-width: 0;
        white-space: nowrap;
        color: inherit;
        visibility: visible;
      }

      .cta.is-typing .cta-label,
      .cta.is-ready .cta-label {
        visibility: visible;
      }

      .typing-title.is-typing::after {
        content: "";
        position: absolute;
        top: 0.02em;
        right: -0.16em;
        width: 0.09em;
        height: 0.88em;
        background: var(--caret);
        animation: caret-blink 820ms steps(1, end) infinite;
      }

      .footer {
        position: absolute;
        left: 50%;
        bottom: clamp(24px, 4vw, 42px);
        transform: translateX(-50%);
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        width: min(720px, calc(100vw - 48px));
        color: var(--text-footer);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .footer-item {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: inherit;
        white-space: nowrap;
      }

      .footer-control {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .footer-label {
        opacity: 0.72;
      }

      .footer-button {
        appearance: none;
        border: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        letter-spacing: inherit;
        text-transform: inherit;
        cursor: pointer;
        transition: color 140ms ease, transform 140ms ease;
      }

      .footer-button:hover {
        color: var(--text-secondary);
        transform: translateY(-1px);
      }

      .language-menu {
        position: absolute;
        left: 50%;
        bottom: calc(100% + 10px);
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 120ms ease, transform 120ms ease;
      }

      .language-menu.is-open {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(-2px);
      }

      .language-option {
        appearance: none;
        border: 0;
        padding: 0;
        background: transparent;
        color: var(--text-footer);
        font: inherit;
        letter-spacing: inherit;
        text-transform: inherit;
        cursor: pointer;
        transition: color 120ms ease, transform 120ms ease;
      }

      .language-option:hover,
      .language-option[aria-current="true"] {
        color: var(--text-secondary);
        transform: translateY(-1px);
      }

      .language-option[hidden] {
        display: none;
      }

      @keyframes caret-blink {
        0%,
        49% {
          opacity: 1;
        }

        50%,
        100% {
          opacity: 0;
        }
      }

      @media (max-width: 720px) {
        .hero {
          top: 22vh;
          width: calc(100vw - 48px);
          gap: 16px;

    <script>

      const languageOptions = document.querySelectorAll('[data-language-option]');
      const translatable = document.querySelectorAll('[data-i18n]');
      const primaryDownloadButton = document.querySelector('[data-primary-download]');

      const copy = {

          github: 'GitHub',
          footerLanguageLabel: 'Språk',
          footerThemeLabel: 'Tema',
          themeLight: 'Ljus',

        },
      };

      const downloadTargets = [
        { id: 'macos-arm64', os: 'macos', arch: 'arm64', label: 'macOS ARM64', format: 'DMG', asset: 'miawk-macos-arm64.dmg' },
        { id: 'macos-x64', os: 'macos', arch: 'x64', label: 'macOS x86_64', format: 'DMG', asset: 'miawk-macos-x86_64.dmg' },
        { id: 'windows-arm64', os: 'windows', arch: 'arm64', label: 'Windows ARM64', format: 'MSI', asset: 'miawk-windows-arm64.msi' },
        { id: 'windows-x64', os: 'windows', arch: 'x64', label: 'Windows x86_64', format: 'MSI', asset: 'miawk-windows-x86_64.msi' },
        { id: 'linux-arm64', os: 'linux', arch: 'arm64', label: 'Linux ARM64', format: 'AppImage', asset: 'miawk-linux-arm64.AppImage' },
        { id: 'linux-x64', os: 'linux', arch: 'x64', label: 'Linux x86_64', format: 'AppImage', asset: 'miawk-linux-x86_64.AppImage' },
      ];
      const latestReleaseBaseUrl = 'https://github.com/muxyng/miawk/releases/latest/download/';

      let currentTheme = 'dark';
      let currentLanguage = 'en';
      let hasManualTheme = false;
      let currentDownloadTarget = null;
      let downloadsOpen = false;
      const systemThemeQuery = window.matchMedia('(prefers-color-scheme: light)');

      const detectBestDownloadTarget = () => {
        const platformSource = `${navigator.userAgentData?.platform || ''} ${navigator.platform || ''}`.toLowerCase();
        const userAgent = (navigator.userAgent || '').toLowerCase();
        const architectureSource = `${navigator.userAgentData?.architecture || ''} ${navigator.platform || ''} ${navigator.userAgent || ''}`.toLowerCase();

        let os = 'macos';
        if (platformSource.includes('win') || userAgent.includes('windows')) {
          os = 'windows';
        } else if (platformSource.includes('linux') || userAgent.includes('linux')) {
          os = 'linux';
        } else if (platformSource.includes('mac') || userAgent.includes('mac os') || userAgent.includes('macintosh')) {
          os = 'macos';
        }

        let arch = 'x64';
        if (/(arm64|aarch64|armv8|arm)/.test(architectureSource)) {
          arch = 'arm64';
        } else if (/(x86_64|win64|wow64|x64|amd64|x86-64|intel)/.test(architectureSource)) {
          arch = 'x64';
        } else if (os === 'macos') {
          arch = 'arm64';
        }

        return downloadTargets.find((target) => target.os === os && target.arch === arch) || downloadTargets[0];
      };

      const setDownloadsOpen = (isOpen) => {
        downloadsOpen = isOpen;
        if (heroDefault) {
          heroDefault.hidden = isOpen;
        }
        if (downloadDialog) {
          downloadDialog.hidden = !isOpen;
        }
      };

      const renderDownloadRows = () => {
        if (!downloadRows) {
          return;
        }

        downloadRows.replaceChildren();

        ['macos', 'windows', 'linux'].forEach((os) => {
          const row = document.createElement('div');
          row.className = 'download-row';

          const osLabel = document.createElement('div');
          osLabel.className = 'download-os';
          osLabel.textContent = os === 'macos' ? 'macOS' : os === 'windows' ? 'Windows' : 'Linux';
          row.append(osLabel);

          downloadTargets
            .filter((target) => target.os === os)
            .forEach((target) => {
              const option = document.createElement('button');
              option.type = 'button';
              option.className = 'download-option';
              option.dataset.downloadTarget = target.id;
              option.setAttribute('aria-label', `${target.label} ${target.format}`);

              if (target.id === currentDownloadTarget?.id) {
                option.classList.add('is-selected');
              }

              const copyWrap = document.createElement('span');
              copyWrap.className = 'download-option-copy';

              const arch = document.createElement('span');
              arch.className = 'download-option-arch';
              arch.textContent = target.arch === 'arm64' ? 'ARM64' : 'x86_64';

              const format = document.createElement('span');
              format.className = 'download-option-format';
              format.textContent = target.format;

              copyWrap.append(arch, format);
              option.append(copyWrap);
              option.addEventListener('click', () => {
                requestDownload(target);
              });
              row.append(option);
            });

          downloadRows.append(row);
        });
      };

      const syncDownloadUI = () => {
        if (!currentDownloadTarget) {
          currentDownloadTarget = detectBestDownloadTarget();
        }

        if (primaryDownloadButton) {
          primaryDownloadButton.dataset.downloadTarget = currentDownloadTarget.id;
          primaryDownloadButton.setAttribute('aria-label', `${(copy[currentLanguage] || copy.en).download} ${currentDownloadTarget.label}`);
        }

        const localized = copy[currentLanguage] || copy.en;

        if (downloadTitle) {
          downloadTitle.textContent = localized.downloadDialogTitle;
        }

        if (downloadCopy) {
          downloadCopy.innerHTML = `${localized.downloadDialogCopyStart} <strong>${currentDownloadTarget.label}</strong> ${localized.downloadDialogCopyEnd}`;
        }

        if (downloadBack) {
          downloadBack.textContent = localized.back;
        }

        renderDownloadRows();
      };

      const requestDownload = (target) => {
        currentDownloadTarget = target;
        syncDownloadUI();
        setDownloadsOpen(true);
        window.dispatchEvent(new CustomEvent('miawk-download-request', { detail: target }));

        const link = document.createElement('a');
        link.href = `${latestReleaseBaseUrl}${target.asset}`;
        link.rel = 'noreferrer';
        document.body.append(link);
        link.click();
        link.remove();
      };

      const detectLanguage = () => {
        const language = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
        if (language.startsWith('fr')) {
          return 'fr';
        }
        if (language.startsWith('nl')) {
          return 'nl';
        }
        if (language.startsWith('de')) {
          return 'de';
        }
        if (language.startsWith('es')) {
          return 'es';
        }
        if (language.startsWith('it')) {
          return 'it';
        }
        if (language.startsWith('pt')) {
          return 'pt';
        }
        if (language.startsWith('sv')) {
          return 'sv';
        }
        return 'en';
      };

      const setLanguageMenuOpen = (isOpen) => {
        if (!languageMenu || !languageToggle) {
          return;
        }

        languageMenu.classList.toggle('is-open', isOpen);
        languageMenu.setAttribute('aria-hidden', String(!isOpen));
        languageToggle.setAttribute('aria-expanded', String(isOpen));
      };

      const syncLocalizedCopy = () => {
        const localized = copy[currentLanguage] || copy.en;
        document.documentElement.lang = localized.htmlLang;

        if (tagline) {
          tagline.dataset.text = localized.tagline;
          tagline.textContent = localized.tagline;
        }

        typedButtons.forEach((button) => {
          const label = button.querySelector('.cta-label');
          if (!label) {
            return;
          }

          if (button.classList.contains('cta-secondary')) {
            label.dataset.text = localized.github;
            label.textContent = localized.github;
            return;
          }

          label.dataset.text = localized.download;
          label.textContent = localized.download;
        });

        translatable.forEach((element) => {
          const key = element.dataset.i18n;
          if (key && localized[key]) {
            element.textContent = localized[key];
          }
        });

        if (languageToggle) {
          languageToggle.textContent = localized.languageLabel;
          languageToggle.setAttribute('aria-label', localized.languageAria);
        }

        languageOptions.forEach((option) => {
          const isCurrent = option.dataset.languageOption === currentLanguage;
          option.setAttribute('aria-current', String(isCurrent));
          option.hidden = isCurrent;
        });

        if (themeToggle) {
          themeToggle.textContent = currentTheme === 'dark' ? localized.themeLight : localized.themeDark;
          themeToggle.setAttribute('aria-label', `${localized.footerThemeLabel} ${currentTheme === 'dark' ? localized.themeLight : localized.themeDark}`);
        }

        syncDownloadUI();
      };

      const applyLanguage = (language) => {
        currentLanguage = copy[language] ? language : 'en';
        syncLocalizedCopy();
      };

      const whiteDark = ['rgba(255, 255, 255, ALPHA)', 'rgba(248, 246, 250, ALPHA)', 'rgba(238, 234, 242, ALPHA)', 'rgba(224, 218, 230, ALPHA)', 'rgba(224, 218, 230, ALPHA)', 'rgba(224, 218, 230, 0)'];

      const whiteLight = ['rgba(255, 255, 255, ALPHA)', 'rgba(250, 248, 252, ALPHA)', 'rgba(238, 234, 242, ALPHA)', 'rgba(220, 214, 226, ALPHA)', 'rgba(220, 214, 226, ALPHA)', 'rgba(220, 214, 226, 0)'];

      const fillAlphaStops = (stops, multipliers) =>
        stops.map((color, index) => color.replaceAll('ALPHA', multipliers[index].toFixed(3)));

      const getCanvasPalette = () => {
        if (currentTheme === 'light') {
          return {
            composite: 'source-over',
            primary: ['rgba(236, 232, 242, 0.08)', 'rgba(226, 222, 234, 0.058)', 'rgba(214, 208, 224, 0.03)', 'rgba(214, 208, 224, 0)'],
            secondary: ['rgba(244, 242, 246, 0.042)', 'rgba(224, 220, 232, 0.026)', 'rgba(224, 220, 232, 0)'],
            orb: (alpha) => fillAlphaStops(whiteLight, [alpha * 2.9, alpha * 2.02, alpha * 1.5, alpha * 1.08, alpha * 0.34, 0]),
          };
        }

        return {
          composite: 'screen',
          primary: ['rgba(246, 242, 250, 0.06)', 'rgba(232, 228, 240, 0.044)', 'rgba(216, 210, 226, 0.02)', 'rgba(216, 210, 226, 0)'],
          secondary: ['rgba(250, 248, 252, 0.036)', 'rgba(226, 220, 234, 0.022)', 'rgba(226, 220, 234, 0)'],
          orb: (alpha) => fillAlphaStops(whiteDark, [alpha * 3.15, alpha * 2.2, alpha * 1.56, alpha * 1.14, alpha * 0.36, 0]),
        };
      };

      const applyTheme = (theme) => {
        currentTheme = theme === 'light' ? 'light' : 'dark';
        root.dataset.theme = currentTheme;
        syncLocalizedCopy();
      };

      applyLanguage(detectLanguage());
      applyTheme(systemThemeQuery.matches ? 'light' : 'dark');

      themeToggle?.addEventListener('click', () => {
        hasManualTheme = true;
        applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
      });

      systemThemeQuery.addEventListener?.('change', (event) => {
        if (hasManualTheme) {
          return;
        }

        applyTheme(event.matches ? 'light' : 'dark');
      });

      languageToggle?.addEventListener('click', () => {
        const isOpen = languageMenu?.classList.contains('is-open');
        setLanguageMenuOpen(!isOpen);
      });

      primaryDownloadButton?.addEventListener('click', () => {
        requestDownload(currentDownloadTarget || detectBestDownloadTarget());
      });

      downloadBack?.addEventListener('click', () => {
        setDownloadsOpen(false);
      });

      languageOptions.forEach((option) => {
        option.addEventListener('click', () => {
          applyLanguage(option.dataset.languageOption || 'en');
          setLanguageMenuOpen(false);
        });
      });

      document.addEventListener('click', (event) => {
        if (!languageMenu || !languageToggle) {
          return;
        }

        const target = event.target;
        if (!(target instanceof Node)) {
          return;
        }

        if (languageMenu.contains(target) || languageToggle.contains(target)) {
          return;
        }

        setLanguageMenuOpen(false);

        if (!downloadDialog || !primaryDownloadButton || !downloadBack) {
          return;
        }

        if (downloadDialog.contains(target) || primaryDownloadButton.contains(target)) {
          return;
        }

        setDownloadsOpen(false);
      });

      currentDownloadTarget = detectBestDownloadTarget();
      syncDownloadUI();

      typedButtons.forEach((button) => {
        button.classList.remove('is-typing', 'is-ready');
      });

      if (smokeCanvas) {
        const context = smokeCanvas.getContext('2d');
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        let width = 0;
        let height = 0;
        let animationFrame = 0;
        const orbSeeds = [
          { radius: 0.18, driftX: 0.26, driftY: 0.16, alpha: 0.24 },
          { radius: 0.15, driftX: 0.33, driftY: 0.12, alpha: 0.2 },
          { radius: 0.12, driftX: 0.29, driftY: 0.2, alpha: 0.17 },
          { radius: 0.1, driftX: 0.37, driftY: 0.12, alpha: 0.15 },
          { radius: 0.09, driftX: 0.42, driftY: 0.18, alpha: 0.13 },
          { radius: 0.11, driftX: 0.31, driftY: 0.24, alpha: 0.14 },
          { radius: 0.08, driftX: 0.36, driftY: 0.15, alpha: 0.12 },
        ].map((orb, index) => ({
          ...orb,
          seedX: Math.random() * 1000 + index * 31,
          seedY: Math.random() * 1000 + index * 47,
          seedGlow: Math.random() * 1000 + index * 59,
          speedX: 0.46 + Math.random() * 0.28,
          speedY: 0.42 + Math.random() * 0.24,
          speedGlow: 0.52 + Math.random() * 0.22,
          danceSpeedX: 0.00072 + Math.random() * 0.00042,
          danceSpeedY: 0.00064 + Math.random() * 0.00038,
          danceScaleX: 0.028 + Math.random() * 0.026,
          danceScaleY: 0.02 + Math.random() * 0.024,
          dancePhase: Math.random() * Math.PI * 2,
          offsetX: (Math.random() - 0.5) * 0.12,
          offsetY: (Math.random() - 0.5) * 0.08,
          colorIndex: index,
        }));

        const noiseHash = (value) => {
          const hashed = Math.sin(value * 127.1 + 311.7) * 43758.5453123;
          return hashed - Math.floor(hashed);
        };

        const smoothNoise = (seed, time) => {
          const scaled = time;
          const start = Math.floor(scaled);
          const progress = scaled - start;
          const eased = progress * progress * (3 - 2 * progress);
          const a = noiseHash(seed + start);
          const b = noiseHash(seed + start + 1);
          return a + (b - a) * eased;
        };

        const drawOrb = (orb, timeMs, centerX, centerY, baseSize) => {
          const palette = getCanvasPalette();
          const timeX = timeMs * 0.00012 * orb.speedX;
          const timeY = timeMs * 0.00012 * orb.speedY;
          const driftX = smoothNoise(orb.seedX, timeX) * 2 - 1;
          const driftY = smoothNoise(orb.seedY, timeY) * 2 - 1;
          const glowPulse = smoothNoise(orb.seedGlow, timeMs * 0.00014 * orb.speedGlow);
          const danceX = Math.sin(timeMs * orb.danceSpeedX + orb.dancePhase) * orb.danceScaleX;
          const danceY = Math.cos(timeMs * orb.danceSpeedY + orb.dancePhase * 1.37) * orb.danceScaleY;
          const x = centerX + width * (orb.offsetX + driftX * orb.driftX + danceX);
          const y = centerY + height * (orb.offsetY + driftY * orb.driftY + danceY);
          const radius = Math.max(46, baseSize * orb.radius * (0.9 + glowPulse * 0.28));
          const gradient = context.createRadialGradient(
            x,
            y,
            radius * 0.02,
            x,
            y,
            radius
          );

          const orbColors = palette.orb(orb.alpha);
          gradient.addColorStop(0, orbColors[0]);
          gradient.addColorStop(0.14, orbColors[1]);
          gradient.addColorStop(0.34, orbColors[2]);
          gradient.addColorStop(0.58, orbColors[3]);
          gradient.addColorStop(0.78, orbColors[4]);
          gradient.addColorStop(1, orbColors[5]);

          context.fillStyle = gradient;
          context.beginPath();
          context.arc(x, y, radius, 0, Math.PI * 2);
          context.fill();
        };

        const drawBlob = (timeMs = performance.now()) => {
          if (!context) {
            return;
          }

          const palette = getCanvasPalette();

          context.clearRect(0, 0, width, height);
          context.globalCompositeOperation = palette.composite;

          const baseX = width * 0.5;
          const baseY = height * 0.39;
          const primaryX = baseX + Math.sin(timeMs * 0.00019) * width * 0.055;
          const primaryY = baseY + Math.cos(timeMs * 0.00015) * height * 0.04;
          const primaryRadius = Math.max(320, Math.min(width, height) * 0.36);
          const secondaryX = primaryX + Math.cos(timeMs * 0.00031) * width * 0.05;
          const secondaryY = primaryY + Math.sin(timeMs * 0.00024) * height * 0.034;
          const secondaryRadius = primaryRadius * 0.72;

          const primary = context.createRadialGradient(
            primaryX,
            primaryY,
            primaryRadius * 0.1,
            primaryX,
            primaryY,
            primaryRadius
          );
          primary.addColorStop(0, palette.primary[0]);
          primary.addColorStop(0.42, palette.primary[1]);
          primary.addColorStop(0.72, palette.primary[2]);
          primary.addColorStop(1, palette.primary[3]);

          const secondary = context.createRadialGradient(
            secondaryX,
            secondaryY,
            secondaryRadius * 0.08,
            secondaryX,
            secondaryY,
            secondaryRadius
          );
          secondary.addColorStop(0, palette.secondary[0]);
          secondary.addColorStop(0.45, palette.secondary[1]);
          secondary.addColorStop(1, palette.secondary[2]);

          context.fillStyle = primary;
          context.fillRect(0, 0, width, height);
          context.fillStyle = secondary;
          context.fillRect(0, 0, width, height);

          for (const orb of orbSeeds) {
            drawOrb(orb, timeMs, primaryX, primaryY, primaryRadius * 2.1);
          }

          context.globalCompositeOperation = 'source-over';
        };

        const resizeSmoke = () => {
          width = window.innerWidth;
          height = window.innerHeight;
          smokeCanvas.width = Math.max(1, Math.floor(width * window.devicePixelRatio));
          smokeCanvas.height = Math.max(1, Math.floor(height * window.devicePixelRatio));
          smokeCanvas.style.width = `${width}px`;
          smokeCanvas.style.height = `${height}px`;
          if (!context) {
            return;
          }

          context.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
          drawBlob(performance.now());
        };

        const renderSmoke = (timeMs) => {
          drawBlob(timeMs);
          animationFrame = window.requestAnimationFrame(renderSmoke);
        };

        resizeSmoke();
        window.addEventListener('resize', resizeSmoke);

        if (!prefersReducedMotion) {
          animationFrame = window.requestAnimationFrame(renderSmoke);
        } else {
          drawBlob(0);
        }
      }

      if (title) {
        const typeIntoElement = (element, speed, done) => {
          const content = element?.dataset.text ?? element?.textContent ?? '';
          let index = 0;

          if (!element) {
            done?.();
            return;
          }

          element.textContent = '';

          const tick = () => {
            element.textContent = content.slice(0, index + 1);
            index += 1;

            if (index < content.length) {
              window.setTimeout(tick, speed);
              return;
            }

            done?.();
          };

          tick();
        };

        window.setTimeout(() => {
          typeIntoElement(title, 150, () => {
            window.setTimeout(() => {
              title.classList.remove('is-typing');
            }, 120);
          });
          typeIntoElement(tagline, 32);

          typedButtons.forEach((button, buttonIndex) => {
            const label = button.querySelector('.cta-label');
            const labelText = label?.dataset.text ?? '';

            window.setTimeout(() => {
              button.classList.add('is-typing');

              window.setTimeout(() => {
                if (!label) {
                  button.classList.remove('is-typing');
                  button.classList.add('is-ready');
                  return;
                }

                let charIndex = 0;
                label.textContent = '';

                const tickLabel = () => {
                  label.textContent = labelText.slice(0, charIndex + 1);
                  charIndex += 1;

                  if (charIndex < labelText.length) {
                    window.setTimeout(tickLabel, 85);
                    return;
                  }

                  button.classList.remove('is-typing');
                  button.classList.add('is-ready');
                };

                tickLabel();
              }, 70);
            }, buttonIndex * 40);
          });
        }, 180);
      }
    </script>
  </body>
</html>
